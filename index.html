<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microcontrollers &amp; Arduino — Interactive Trial Lesson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#101d3a; --navy2:#182a52; --ink:#1a2540; --ink-soft:#3a4763;
    --teal:#178f87; --teal-d:#0f6e68; --teal-l:#e2f1ef;
    --amber:#e3a23b; --amber-d:#b97f1f; --amber-l:#f9efdc;
    --paper:#eef2f6; --line:#d7e0e9; --card:#fbfcfd; --muted:#5f6b83;
    --green:#2c8f63; --green-l:#e2f2e9; --red:#c95555; --red-l:#f8e6e6;
    --sh:0 2px 6px rgba(16,29,58,.06), 0 14px 34px -18px rgba(16,29,58,.25);
    --sh-sm:0 1px 3px rgba(16,29,58,.07), 0 6px 16px -10px rgba(16,29,58,.2);
    --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--ink);
    background:var(--paper);
    background-image:
      linear-gradient(rgba(23,143,135,.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(23,143,135,.055) 1px, transparent 1px);
    background-size:26px 26px;
    min-height:100vh;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  h1,h2,h3{font-family:'Space Grotesk','Inter',sans-serif}
  .mono{font-family:'JetBrains Mono',monospace}
  .id{font-style:italic;color:var(--teal-d);font-weight:500}
  svg{display:block}

  /* ===== top bar ===== */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;gap:14px;
    padding:12px clamp(14px,4vw,40px);background:rgba(238,242,246,.88);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-family:'Space Grotesk';color:var(--navy);font-size:15px;white-space:nowrap}
  .brand .bchip{width:32px;height:32px;border-radius:10px;background:var(--teal);display:grid;place-items:center;flex:none;box-shadow:var(--sh-sm)}
  .brand .bchip svg{width:18px;height:18px}
  .progress-wrap{flex:1;height:7px;background:#dde5ec;border-radius:99px;overflow:hidden;min-width:50px}
  .progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--amber));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .score-chip{display:flex;align-items:center;gap:8px;background:var(--navy);color:#fff;padding:8px 15px;border-radius:99px;
    font-weight:700;font-size:14px;white-space:nowrap;box-shadow:var(--sh-sm);position:relative}
  .score-chip svg{width:15px;height:15px}
  .score-chip.bump{animation:bump .5s ease}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.15)}100%{transform:scale(1)}}
  .float-pts{position:absolute;top:-10px;right:10px;font-weight:800;font-size:15px;pointer-events:none;
    font-family:'Space Grotesk';animation:floatUp 1.1s ease forwards}
  .float-pts.big{color:var(--green)} .float-pts.small{color:var(--amber-d)}
  @keyframes floatUp{0%{opacity:0;transform:translateY(8px)}20%{opacity:1}100%{opacity:0;transform:translateY(-26px)}}

  /* ===== stage & slides ===== */
  .stage{max-width:1040px;margin:0 auto;padding:100px clamp(14px,4vw,34px) 116px;min-height:100vh;display:flex;align-items:center}
  .slide{display:none;width:100%}
  .slide.active{display:block;animation:slideIn .55s cubic-bezier(.2,.75,.25,1)}
  @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .slide.active .points>li{opacity:0;animation:rise .5s cubic-bezier(.2,.75,.25,1) forwards}
  .slide.active .points>li:nth-child(1){animation-delay:.08s}
  .slide.active .points>li:nth-child(2){animation-delay:.16s}
  .slide.active .points>li:nth-child(3){animation-delay:.24s}
  .slide.active .points>li:nth-child(4){animation-delay:.32s}
  .slide.active .opt{opacity:0;animation:rise .45s cubic-bezier(.2,.75,.25,1) forwards}
  .slide.active .opt:nth-child(1){animation-delay:.08s}
  .slide.active .opt:nth-child(2){animation-delay:.16s}
  .slide.active .opt:nth-child(3){animation-delay:.24s}
  .slide.active .statcard{opacity:0;animation:rise .5s ease forwards}
  .slide.active .statcard:nth-child(1){animation-delay:.1s}
  .slide.active .statcard:nth-child(2){animation-delay:.22s}
  .slide.active .statcard:nth-child(3){animation-delay:.34s}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}
    .slide.active .points>li,.slide.active .opt,.slide.active .statcard{opacity:1!important}}

  .eyebrow{font-family:'Space Grotesk';font-weight:600;letter-spacing:.15em;font-size:12px;text-transform:uppercase;
    color:var(--teal-d);margin-bottom:14px;display:flex;align-items:center;gap:9px}
  .eyebrow .dot{width:7px;height:7px;border-radius:99px;background:var(--amber)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:clamp(22px,4vw,40px)}
  .headicon{width:56px;height:56px;border-radius:16px;background:var(--teal);display:grid;place-items:center;box-shadow:var(--sh-sm);margin-bottom:16px}
  .headicon svg{width:29px;height:29px}
  .headicon.amber{background:var(--amber)} .headicon.navy{background:var(--navy)}
  h2.title{font-size:clamp(24px,4.2vw,38px);font-weight:700;line-height:1.08;letter-spacing:-.01em;color:var(--ink)}
  .title-id{font-size:clamp(15px,2.3vw,19px);margin-top:5px;margin-bottom:6px}
  .lead{color:var(--muted);font-size:clamp(14.5px,2vw,16.5px);max-width:64ch}

  .points{list-style:none;display:grid;gap:11px;margin-top:20px}
  .points li{display:flex;gap:13px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
  .points li .tick{flex:none;width:26px;height:26px;border-radius:8px;background:var(--teal-l);color:var(--teal-d);display:grid;place-items:center;margin-top:1px}
  .points li .tick svg{width:14px;height:14px}
  .points li b{color:var(--ink);font-weight:600;display:block;font-size:15px}
  .points li .id{font-size:13.5px;display:block;margin-top:1px}

  .split{display:grid;grid-template-columns:1fr;gap:24px;align-items:center}
  @media(min-width:780px){.split{grid-template-columns:1.05fr .95fr}}
  .visual{display:grid;place-items:center;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:22px;min-height:200px}
  .visual svg{max-width:100%;height:auto}

  /* ===== real photos with graceful fallback ===== */
  .photo{margin:0}
  .ph-wrap{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--line);
    background:linear-gradient(120deg,#e6ecf2,#f2f6f9);aspect-ratio:4/3;box-shadow:var(--sh)}
  .ph-wrap img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .6s ease}
  .ph-wrap img.ld{opacity:1}
  .ph-wrap .ph-fb{position:absolute;inset:0;display:none;place-items:center;padding:20px}
  .ph-wrap.fail img{display:none}
  .ph-wrap.fail .ph-fb{display:grid}
  .photo figcaption{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.45}
  .photo .credit{display:block;font-size:11px;color:#93a0b5}
  .photo.tall .ph-wrap{aspect-ratio:3/2.6}

  .pro{display:inline-flex;align-items:flex-start;gap:10px;background:var(--amber-l);border:1px solid #ecd8ae;
    border-radius:13px;padding:11px 15px;margin-top:16px;font-size:13.5px;color:var(--ink)}
  .pro .pb{flex:none;background:var(--amber);color:#3a2600;font-family:'Space Grotesk';font-weight:700;font-size:10.5px;
    letter-spacing:.08em;border-radius:7px;padding:3px 8px;margin-top:1px}
  .pro .id{display:block;font-size:12.5px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin-top:20px}
  .statcard{background:var(--paper);border:1px solid var(--line);border-radius:15px;padding:18px 16px;text-align:center}
  .statnum{font-family:'Space Grotesk';font-weight:700;font-size:clamp(24px,3.4vw,33px);color:var(--teal-d);line-height:1.05}
  .statlbl{font-size:13px;color:var(--ink);font-weight:600;margin-top:6px}
  .statid{font-size:12px}

  /* ===== dark panels ===== */
  .dark-panel{background:
      radial-gradient(110% 120% at 88% -10%, #1c3468 0%, transparent 55%),
      radial-gradient(90% 100% at -5% 110%, #143152 0%, transparent 50%),
      var(--navy);
    color:#fff;border:none;position:relative;overflow:hidden;border-radius:26px;padding:clamp(30px,6vw,62px)}
  .dark-panel:before{content:"";position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
    background-size:30px 30px;opacity:.6}
  .dark-panel>*{position:relative;z-index:1}
  .blob{position:absolute;border-radius:50%;z-index:0;animation:drift 9s ease-in-out infinite alternate}
  .b1{width:260px;height:260px;background:rgba(23,143,135,.2);top:-80px;right:-50px}
  .b2{width:190px;height:190px;background:rgba(227,162,59,.14);bottom:-60px;left:-40px;animation-delay:2.5s}
  @keyframes drift{from{transform:translate(0,0)}to{transform:translate(-16px,14px)}}
  .dark-panel .eyebrow{color:var(--amber)}
  .cover h1{font-size:clamp(31px,5.8vw,54px);line-height:1.03;font-weight:700;letter-spacing:-.02em}
  .cover .h1-id{color:var(--amber);font-size:clamp(17px,3vw,24px);margin-top:8px;font-style:italic;font-weight:600}
  .cover p{color:#c6d2ea;max-width:58ch;margin-top:18px;font-size:clamp(14.5px,2vw,16.5px)}
  .cover p .id{color:#84ddd3}
  .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px;align-items:center}
  .meta-pill{display:inline-flex;gap:8px;align-items:center;color:#9cb1d6;font-size:12.5px;border:1px solid rgba(255,255,255,.16);border-radius:99px;padding:7px 13px}

  /* ===== buttons ===== */
  .btn{font-family:'Space Grotesk';font-weight:600;font-size:15.5px;border:none;cursor:pointer;border-radius:13px;
    padding:13px 24px;display:inline-flex;align-items:center;gap:10px;
    transition:transform .15s ease,box-shadow .2s ease,background .15s;box-shadow:var(--sh-sm)}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--amber);color:#3a2600}
  .btn-primary:hover{background:var(--amber-d);color:#fff}
  .btn-teal{background:var(--teal);color:#fff}
  .btn-teal:hover{background:var(--teal-d)}
  .btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line);box-shadow:none}
  .btn-ghost:hover{background:#fff;border-color:#b9cbd9;transform:none}
  .btn svg{width:17px;height:17px}
  .btn[disabled]{opacity:.35;cursor:not-allowed;transform:none}

  /* ===== quiz ===== */
  .qnum{font-family:'Space Grotesk';font-weight:700;color:var(--amber-d);font-size:12.5px;letter-spacing:.1em;text-transform:uppercase}
  .quiz h2{font-size:clamp(20px,3.3vw,29px);margin-top:6px;line-height:1.18;color:var(--ink)}
  .q-id{margin:6px 0 4px;font-size:15.5px}
  .opts{display:grid;gap:12px;margin-top:20px}
  .opt{text-align:left;background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;
    font-size:15.5px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:13px;font-family:inherit;
    transition:border-color .15s,background .15s,transform .12s;box-shadow:var(--sh-sm)}
  .opt:hover:not(.locked){border-color:var(--teal);background:var(--teal-l);transform:translateX(3px)}
  .opt .key{flex:none;width:30px;height:30px;border-radius:9px;background:var(--paper);color:var(--ink-soft);
    display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:14px}
  .opt .otext .id{display:block;font-size:13px;font-weight:500;margin-top:1px}
  .opt.correct{border-color:var(--green);background:var(--green-l);animation:pop .35s ease}
  .opt.correct .key{background:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:var(--red-l);animation:shake .4s ease}
  .opt.wrong .key{background:var(--red);color:#fff}
  .opt.locked{cursor:default;transform:none}
  .opt.dim{opacity:.45}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.025)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}55%{transform:translateX(5px)}80%{transform:translateX(-3px)}}
  .feedback{margin-top:16px;border-radius:14px;padding:14px 17px;display:none;align-items:flex-start;gap:12px;font-size:14.5px}
  .feedback.show{display:flex;animation:slideIn .3s ease}
  .feedback.ok{background:var(--green-l);border:1px solid #bfe3d0}
  .feedback.no{background:var(--amber-l);border:1px solid #ecd8ae}
  .feedback .fi{flex:none;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:800}
  .feedback .fi svg{width:14px;height:14px}
  .feedback.ok .fi{background:var(--green)}
  .feedback.no .fi{background:var(--amber-d)}
  .feedback b{display:block;color:var(--ink)}
  .feedback .id{font-size:13px}

  /* ===== games ===== */
  .game-tag{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-family:'Space Grotesk';
    font-weight:600;font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;padding:7px 14px;border-radius:99px;margin-bottom:14px}
  .game-tag svg{width:14px;height:14px}
  .status-tag{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-family:'Space Grotesk';
    padding:7px 16px;border-radius:99px;font-size:13.5px;margin-top:8px}
  .status-tag.off{background:var(--red-l);color:var(--red)}
  .status-tag.on{background:var(--green-l);color:var(--green)}
  .status-tag.mid{background:var(--amber-l);color:var(--amber-d)}
  .hint{color:var(--muted);font-size:13.5px;margin-top:10px}
  .gstage{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:20px;text-align:center}

  .flowpath{stroke:#e3a23b;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-dasharray:9 10;opacity:0;transition:opacity .3s}
  .flowpath.on{opacity:1;animation:dashmove 1.1s linear infinite}
  @keyframes dashmove{to{stroke-dashoffset:-38}}
  .pulse{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

  .pol-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:18px}
  @media(min-width:640px){.pol-grid{grid-template-columns:1fr 1fr}}
  .pol-card{background:#fff;border:2px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;text-align:center;
    transition:border-color .15s,transform .12s,background .15s;box-shadow:var(--sh-sm)}
  .pol-card:hover:not(.locked){border-color:var(--teal);transform:translateY(-3px)}
  .pol-card.correct{border-color:var(--green);background:var(--green-l);animation:pop .35s ease}
  .pol-card.wrong{border-color:var(--red);background:var(--red-l);animation:shake .4s ease}
  .pol-card.locked{cursor:default}
  .pol-card .pname{font-family:'Space Grotesk';font-weight:700;margin-top:10px;font-size:15px}
  .pol-card .pid{font-size:13px}

  .idgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-top:18px}
  .idcard{background:#fff;border:2px solid var(--line);border-radius:16px;padding:12px;cursor:pointer;text-align:center;
    transition:all .15s;box-shadow:var(--sh-sm)}
  .idcard:hover:not(.locked){border-color:var(--teal);transform:translateY(-3px)}
  .idcard.correct{border-color:var(--green);background:var(--green-l);animation:pop .35s ease}
  .idcard.wrong{border-color:var(--red);animation:shake .4s ease}
  .idcard.locked{cursor:default}
  .idcard .ph-wrap{aspect-ratio:4/3;box-shadow:none}
  .idcard .lbl{font-family:'Space Grotesk';font-weight:700;font-size:14px;margin-top:9px}

  .match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
  .mcol{display:grid;gap:10px;align-content:start}
  .mitem{background:#fff;border:2px solid var(--line);border-radius:13px;padding:12px 13px;cursor:pointer;font-weight:600;
    font-size:14px;text-align:left;font-family:inherit;color:var(--ink);transition:border-color .15s,background .15s;box-shadow:var(--sh-sm)}
  .mitem .id{display:block;font-size:12px;font-weight:500}
  .mitem:hover:not(.done){border-color:var(--teal)}
  .mitem.sel{border-color:var(--amber);background:var(--amber-l)}
  .mitem.done{border-color:var(--green);background:var(--green-l);cursor:default;animation:pop .3s ease}
  .mitem.err{animation:shake .4s ease;border-color:var(--red)}
  .mitem .mono{font-size:15px}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
  .chip{background:#fff;border:2px solid var(--line);border-radius:12px;padding:11px 15px;cursor:pointer;font-weight:600;
    font-family:'JetBrains Mono';font-size:14px;color:var(--ink);transition:all .15s;box-shadow:var(--sh-sm)}
  .chip:hover:not(.used){border-color:var(--teal);transform:translateY(-2px)}
  .chip.used{opacity:.25;pointer-events:none}
  .chip.err{animation:shake .4s ease;border-color:var(--red);background:var(--red-l)}
  .seq{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:18px;min-height:52px;
    background:var(--paper);border:1px dashed #b9c8d6;border-radius:14px;padding:12px}
  .seq .slot{background:var(--teal);color:#fff;border-radius:10px;padding:9px 13px;font-family:'JetBrains Mono';
    font-size:13.5px;font-weight:600;animation:pop .3s ease}
  .seq .arrowsep svg{width:16px;height:16px;color:var(--muted)}
  .seq .placeholder{color:var(--muted);font-size:13.5px;font-style:italic}

  .sim{display:grid;gap:18px;grid-template-columns:1fr}
  @media(min-width:780px){.sim{grid-template-columns:1fr 1fr}}
  .code{background:#0c1527;border-radius:16px;padding:20px;overflow:auto;box-shadow:var(--sh)}
  .code .fname{color:#6d7fa8;font-size:12.5px;margin-bottom:10px;font-family:'JetBrains Mono'}
  .code pre{font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.8;color:#e6edf3}
  .kw{color:#6fb1ff}.fn{color:#8fd6ce}.num{color:#ecba63}.cm{color:#7d9a76}.con{color:#c9a2e8}
  .simled{width:74px;height:74px;border-radius:50%;background:#cfd6e0;border:4px solid #aab4c2;margin:14px auto 6px;
    transition:background .18s,border-color .18s,box-shadow .18s}
  .simled.on{background:var(--amber);border-color:var(--amber-d);box-shadow:0 0 0 10px rgba(227,162,59,.18),0 0 26px rgba(227,162,59,.55)}
  .slider-row{display:flex;align-items:center;gap:12px;margin-top:16px;justify-content:center;flex-wrap:wrap}
  input[type=range]{accent-color:var(--teal);width:min(230px,62%)}
  .delayval{font-family:'JetBrains Mono';font-weight:700;color:var(--teal-d);font-size:14px;min-width:76px;text-align:left}

  /* ohm lab / pwm shared displays */
  .bigread{font-family:'Space Grotesk';font-weight:700;font-size:clamp(34px,6vw,50px);color:var(--ink);line-height:1}
  .bigread small{font-size:.45em;color:var(--muted);font-weight:600}
  .zone{position:relative;height:16px;border-radius:99px;background:#dde5ec;margin:16px 8px 6px;overflow:visible}
  .zone .safe{position:absolute;top:0;bottom:0;background:rgba(44,143,99,.3);border:1.5px solid var(--green);border-radius:99px}
  .zone .needle{position:absolute;top:-5px;width:4px;height:26px;background:var(--navy);border-radius:3px;transition:left .2s ease}
  .zlbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin:2px 10px 0}
  .formula{font-family:'JetBrains Mono';font-weight:700;font-size:clamp(17px,2.6vw,22px);color:var(--teal-d);
    background:var(--teal-l);border-radius:12px;padding:10px 16px;display:inline-block;margin-top:12px}

  .bits{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .bit{width:76px;border:2px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;padding:12px 6px;text-align:center;
    font-family:'Space Grotesk';transition:all .15s;box-shadow:var(--sh-sm)}
  .bit:hover{border-color:var(--teal)}
  .bit .bv{font-size:11.5px;color:var(--muted);font-weight:600}
  .bit .bd{font-size:30px;font-weight:700;color:#b9c4d4;line-height:1.15}
  .bit.on{border-color:var(--teal);background:var(--teal-l)}
  .bit.on .bd{color:var(--teal-d)}

  .buglines{display:grid;gap:8px;margin-top:16px}
  .bugline{font-family:'JetBrains Mono';font-size:14px;text-align:left;background:#0c1527;color:#e6edf3;border:2px solid #1d2b4d;
    border-radius:11px;padding:12px 14px;cursor:pointer;transition:all .15s}
  .bugline:hover:not(.locked){border-color:var(--teal)}
  .bugline.correct{border-color:var(--green);background:#0f2c1f;animation:pop .35s ease}
  .bugline.wrong{border-color:var(--red);animation:shake .4s ease}
  .bugline.locked{cursor:default}

  .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px}
  .gallery .photo figcaption b{color:var(--ink);font-size:13.5px}

  /* ===== results ===== */
  .results{text-align:center}
  .results h2{font-size:clamp(25px,5vw,40px)}
  .ring-wrap{display:grid;place-items:center;margin:20px 0 8px}
  .ring{position:relative;width:190px;height:190px}
  .ring svg{transform:rotate(-90deg)}
  .ring .rc{transition:stroke-dashoffset 1.5s cubic-bezier(.2,.7,.2,1)}
  .ring .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .ring .big{font-family:'Space Grotesk';font-weight:700;font-size:40px;line-height:1;color:#fff}
  .ring .sub{color:#8fe2d8;font-size:12.5px;margin-top:5px;font-weight:600}
  .level{display:inline-flex;gap:9px;align-items:center;background:var(--amber);color:#3a2600;font-family:'Space Grotesk';
    font-weight:700;padding:9px 20px;border-radius:99px;font-size:16px;margin-top:6px}
  .level svg{width:16px;height:16px}
  .res-line{color:#c6d2ea;max-width:54ch;margin:14px auto 0;font-size:15px}
  .res-line .id{color:#84ddd3}
  .stat-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
  .stat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:13px;padding:11px 18px;min-width:104px}
  .stat .sv{font-family:'Space Grotesk';font-weight:700;font-size:21px}
  .stat .sl{font-size:11.5px;color:#9cb1d6;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
  .credits{font-size:11px;color:#7e90b4;margin-top:20px}

  /* ===== nav ===== */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:60;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:12px clamp(14px,4vw,40px);background:rgba(238,242,246,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line)}
  .counter{font-family:'Space Grotesk';font-weight:600;color:var(--muted);font-size:13.5px}
  .counter b{color:var(--ink)}
  .nav .spacer{flex:1}
  @media(max-width:560px){.btn{padding:12px 16px;font-size:14.5px}.brand span.full{display:none}}
  .kbd-hint{position:fixed;bottom:70px;right:16px;font-size:11.5px;color:var(--muted);z-index:40;
    background:rgba(255,255,255,.75);padding:4px 10px;border-radius:8px;border:1px solid var(--line)}
  @media(max-width:700px){.kbd-hint{display:none}}
</style>

function addPoints(n,small){
  score+=n;
  document.getElementById('scoreVal').textContent=score;
  const chip=document.getElementById('scoreChip');
  chip.classList.remove('bump');void chip.offsetWidth;chip.classList.add('bump');
  const f=document.createElement('span');
  f.className='float-pts '+(small?'small':'big');f.textContent='+'+n;
  chip.appendChild(f);setTimeout(()=>f.remove(),1100);
}
function tieredPts(tries){return tries===1?100:(tries===2?60:30);}

    <div class="pro"><span class="pb">PRO FACT</span><span>Every command you used today — digitalWrite, delay, analogRead — is used unchanged in those robots.<span class="id">Setiap perintah hari ini — digitalWrite, delay, analogRead — dipakai tanpa berubah di robot-robot itu.</span></span></div>
  </div></section>`;
}

function rQuiz(s,idx){
  return `<section class="slide"><div class="card quiz">
    <div class="qnum">${s.label} · Kuis</div>
    <h2>${s.data.q.en}</h2><div class="q-id id">${s.data.q.id}</div>
    <div class="opts">
      ${s.data.opts.map((o,i)=>`<button class="opt" onclick="answer(${idx},this)" data-ok="${o.ok?1:0}">
        <span class="key">${String.fromCharCode(65+i)}</span>
        <span class="otext">${o.en}<span class="id">${o.id}</span></span></button>`).join('')}
    </div>
    <div class="feedback" id="fb${idx}"><span class="fi"></span><span><b class="ft"></b><span class="id fx">${s.data.exp.id}</span></span></div>
  </div></section>`;
}

function rResults(){
  return `<section class="slide"><div class="dark-panel results">
    <div class="blob b1"></div><div class="blob b2"></div>
    <div class="eyebrow" style="justify-content:center"><span class="dot"></span>Lesson complete · Selesai</div>
    <h2>Great work! · Kerja bagus!</h2>
    <div class="ring-wrap"><div class="ring">
      <svg width="190" height="190">
        <circle cx="95" cy="95" r="82" fill="none" stroke="rgba(255,255,255,.13)" stroke-width="15"/>
        <circle id="ringArc" class="rc" cx="95" cy="95" r="82" fill="none" stroke="#e3a23b" stroke-width="15" stroke-linecap="round" stroke-dasharray="515" stroke-dashoffset="515"/>
      </svg>
      <div class="center"><div><div class="big" id="resScore">0</div><div class="sub" id="resPct"></div></div></div>
    </div></div>
    <div class="level" id="resLevel">${I.trophy}<span id="resLevelTxt"></span></div>
    <p class="res-line" id="resMsg"></p>
    <div class="stat-row">
      <div class="stat"><div class="sv" id="stQuiz">0</div><div class="sl">quiz points</div></div>
      <div class="stat"><div class="sv" id="stFirst">0</div><div class="sl">first-try wins</div></div>
      <div class="stat"><div class="sv">${gamesCount}</div><div class="sl">games played</div></div>
    </div>
    <button class="btn btn-primary" style="margin-top:26px" onclick="restart()">${I.refresh}<span>Play again — new questions · Main lagi</span></button>
    <div class="hint" style="color:#9cb1d6;margin-top:10px">Every run shuffles the questions · Setiap sesi soal diacak ulang</div>
    <div class="credits">Photos: Wikimedia Commons contributors (CC BY / CC BY-SA / public domain)</div>
  </div></section>`;
}

/* ============================================================
   MOUNT & NAV
============================================================ */
function mount(){
  buildDeck();
  quizCount=slides.filter(s=>s.type==='quiz').length;
  MAX=quizCount*100+GAME_MAX;
  answered={};attempts={};firstTry=0;
  g.quizPts=0;g.circuitDone=false;g.circuitOn=false;
  g.polDone=false;g.polTries=0;g.idDone=false;g.idTries=0;
  g.ohmDone=false;g.pwmDone=false;g.pwmTries=0;g.binDone=false;g.binTries=0;
  g.bugDone=false;g.bugTries=0;
  if(g.blinkTimer)clearTimeout(g.blinkTimer);g.blinkTimer=null;g.blinkOn=false;g.blinkDelay=1000;g.blinkBonus=false;
  const root=document.getElementById('slides');root.innerHTML='';
  slides.forEach((s,idx)=>{
    let h='';
    switch(s.type){
      case 'cover':h=rCover();break;
      case 'content':h=rContent(s);break;
      case 'stats':h=rStats();break;
      case 'ohmlaw':h=rOhmLaw();break;
      case 'quiz':h=rQuiz(s,idx);break;
      case 'gameCircuit':h=rGameCircuit();break;
      case 'gameOhm':h=rGameOhm();break;
      case 'gamePolarity':h=rGamePolarity();break;
      case 'gameID':h=rGameID();break;
      case 'gamePWM':h=rGamePWM();break;
      case 'gameMatch':h=rGameMatch();break;
      case 'gameBinary':h=rGameBinary();break;
      case 'blinkIntro':h=rBlinkIntro();break;
      case 'gameBlink':h=rGameBlink();break;
      case 'codeVocab':h=rCodeVocab();break;
      case 'gameBug':h=rGameBug();break;
      case 'gameOrder':h=rGameOrder();break;
      case 'gameSensor':h=rGameSensor();break;
      case 'projects':h=rProjects();break;
      case 'roadmap':h=rRoadmap();break;
      case 'results':h=rResults();break;
    }
    root.appendChild(el(h));
  });
  document.getElementById('totNum').textContent=slides.length;
  showSlide(0);
  ohmUpdate();pwmUpdate();
}

const nodes=()=>document.querySelectorAll('.slide');
function showSlide(i){
  cur=Math.max(0,Math.min(slides.length-1,i));
  nodes().forEach((n,idx)=>n.classList.toggle('active',idx===cur));
  document.getElementById('curNum').textContent=cur+1;
  document.getElementById('progress').style.width=(cur/(slides.length-1)*100)+'%';
  document.getElementById('backBtn').disabled=cur===0;
  document.getElementById('nextBtn').style.visibility=cur===slides.length-1?'hidden':'visible';
  if(slides[cur].type==='results')fillResults();
  if(slides[cur].type!=='gameBlink')stopBlink();
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(d){showSlide(cur+d);}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'&&cur<slides.length-1)go(1);
  if(e.key==='ArrowLeft'&&cur>0)go(-1);
});

/* ============================================================
   QUIZ
============================================================ */
function answer(idx,btn){
  if(answered[idx])return;
  attempts[idx]=(attempts[idx]||0)+1;
  const fb=document.getElementById('fb'+idx);
  if(btn.dataset.ok==='1'){
    answered[idx]=true;
    const t=attempts[idx],pts=tieredPts(t);
    if(t===1)firstTry++;
    g.quizPts+=pts;
    btn.classList.add('correct','locked');
    btn.parentElement.querySelectorAll('.opt').forEach(o=>{o.classList.add('locked');if(o!==btn&&o.dataset.ok!=='1')o.classList.add('dim');});
    addPoints(pts,false);
    fb.className='feedback ok show';
    fb.querySelector('.fi').innerHTML=I.tick;
    fb.querySelector('.ft').textContent=(t===1?'Perfect, first try! +':'Correct! +')+pts+' — '+slides[idx].data.exp.en;
  }else{
    btn.classList.add('wrong','locked');
    addPoints(10,true);
    noFb(fb,'+10 for trying — look again!','Coba lihat lagi! Jawaban benar memberi lebih banyak poin.');
  }
}

/* ============================================================
   GAME 1 — circuit
============================================================ */
function toggleCircuit(){
  g.circuitOn=!g.circuitOn;
  const arm=document.getElementById('gArm'),bulb=document.getElementById('gBulb'),
        fil=document.getElementById('gFil'),st=document.getElementById('gStatus'),
        flow=document.getElementById('gFlow'),hint=document.getElementById('gHint');
  if(g.circuitOn){
    arm.setAttribute('x2','75');arm.setAttribute('y2','178');arm.setAttribute('stroke','#2c8f63');
    bulb.setAttribute('fill','#e3a23b');bulb.setAttribute('stroke','#b97f1f');bulb.classList.add('pulse');
    fil.setAttribute('stroke','#8a5f00');flow.classList.add('on');
    st.className='status-tag on';st.textContent='Circuit CLOSED · Tertutup — light ON';
    if(!g.circuitDone){g.circuitDone=true;addPoints(100,false);hint.textContent='+100! The loop is complete — current flows. · Lingkaran lengkap — arus mengalir!';}
    else hint.textContent='Current flows around the loop. · Arus mengalir mengelilingi rangkaian.';
  }else{
    arm.setAttribute('x2','84');arm.setAttribute('y2','156');arm.setAttribute('stroke','#c95555');
    bulb.setAttribute('fill','#cfd6e0');bulb.setAttribute('stroke','#aab4c2');bulb.classList.remove('pulse');
    fil.setAttribute('stroke','#aab4c2');flow.classList.remove('on');
    st.className='status-tag off';st.textContent='Circuit OPEN · Terbuka';
    hint.textContent='The gap stops the current. · Celah menghentikan arus.';
  }
}

/* ============================================================
   GAME 2 — Ohm lab
============================================================ */
function ohmUpdate(){
  const vEl=document.getElementById('ohmV');if(!vEl)return;
  const V=+vEl.value,R=+document.getElementById('ohmR').value;
  const Ima=V/R*1000;
  document.getElementById('ohmVv').textContent=V.toFixed(1)+' V';
  document.getElementById('ohmRv').textContent=R+' Ω';
  document.getElementById('ohmI').textContent=Ima.toFixed(1);
  const zone=document.querySelector('.zone');
  const maxI=60,pct=Math.min(100,Ima/maxI*100);
  document.getElementById('ohmNeedle').style.left='calc('+pct+'% - 2px)';
  const s=document.getElementById('ohmSafe');
  s.style.left=(15/maxI*100)+'%';s.style.width=((25-15)/maxI*100)+'%';
  const st=document.getElementById('ohmStatus');
  if(Ima>25){st.className='status-tag mid';st.textContent='Too much — the LED would burn! · Terlalu besar!';}
  else if(Ima<15){st.className='status-tag off';st.textContent='Too little — very dim. · Terlalu kecil — sangat redup.';}
  else{
    st.className='status-tag on';st.textContent='Perfect — safe zone! · Sempurna — zona aman!';
    if(!g.ohmDone){
      g.ohmDone=true;addPoints(100,false);firstTry++;
      okFb(document.getElementById('ohmFb'),'+100 — you just used Ohm\u2019s Law like a real engineer.','+100 — kamu baru saja memakai Hukum Ohm seperti insinyur sungguhan.');
    }
  }
}

/* ============================================================
   GAME 3 — polarity
============================================================ */
function polPick(i){
  if(g.polDone)return;
  g.polTries++;
  const card=document.getElementById('pol'+i),fb=document.getElementById('polFb');
  if(i===g.polCorrectIdx){
    g.polDone=true;
    card.classList.add('correct','locked');
    document.getElementById('pol'+(1-i)).classList.add('locked');
    card.innerHTML=polSvg(true,true)+`<div class="pname">Circuit ${i===0?'A':'B'} — lights up!</div><div class="pid id">Menyala!</div>`;
    const pts=tieredPts(g.polTries);if(g.polTries===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — current enters through the + leg.','Arus masuk lewat kaki +, jadi LED menyala.');
  }else{
    card.classList.add('wrong');setTimeout(()=>card.classList.remove('wrong'),450);
    addPoints(10,true);
    noFb(fb,'+10 — that LED is backwards, no light.','LED itu terbalik, tidak menyala. Coba yang satunya!');
  }
}

/* ============================================================
   GAME 4 — component ID
============================================================ */
function idPick(i){
  if(g.idDone)return;
  g.idTries++;
  const card=document.getElementById('idc'+i),fb=document.getElementById('idFb');
  if(g.idItems[i].ok){
    g.idDone=true;
    card.classList.add('correct','locked');
    document.querySelectorAll('.idcard').forEach(c=>c.classList.add('locked'));
    const pts=tieredPts(g.idTries);if(g.idTries===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — the color stripes gave it away.','Garis-garis warnanya yang menandakan.');
  }else{
    card.classList.add('wrong');setTimeout(()=>card.classList.remove('wrong'),450);
    addPoints(10,true);
    noFb(fb,'+10 — not this one. Look for the striped bodies.','Bukan yang ini. Cari badan bergaris warna.');
  }
}

/* ============================================================
   GAME 5 — PWM
============================================================ */
function pwmUpdate(){
  const s=document.getElementById('pwmSlider');if(!s)return;
  const v=+s.value,duty=v/255;
  document.getElementById('pwmVv').textContent=v;
  document.getElementById('pwmValTxt').textContent=v;
  document.getElementById('pwmLed').style.opacity=(0.08+0.92*duty).toFixed(2);
  document.getElementById('pwmDuty').textContent=Math.round(duty*100)+'%';
  /* square wave: two periods */
  const w=240,x0=10,yH=12,yL=40,per=w/2,hi=per*duty;
  let d='';
  for(let k=0;k<2;k++){
    const a=x0+k*per;
    d+=`M ${a} ${yL} L ${a} ${yH} L ${a+Math.max(1,hi)} ${yH} L ${a+Math.max(1,hi)} ${yL} L ${a+per} ${yL} `;
  }
  document.getElementById('pwmWave').setAttribute('d',d);
}
function pwmCheck(){
  if(g.pwmDone)return;
  g.pwmTries++;
  const v=+document.getElementById('pwmSlider').value,fb=document.getElementById('pwmFb');
  if(Math.abs(v-g.pwmTarget)<=12){
    g.pwmDone=true;
    const pts=tieredPts(g.pwmTries);if(g.pwmTries===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — analogWrite(9, '+v+') accepted. That is real PWM.','analogWrite(9, '+v+') diterima. Itu PWM sungguhan.');
  }else{
    addPoints(10,true);
    noFb(fb,'+10 — '+(v<g.pwmTarget?'brighter! Slide right.':'dimmer! Slide left.'),(v<g.pwmTarget?'Lebih terang! Geser ke kanan.':'Lebih redup! Geser ke kiri.'));
  }
}

/* ============================================================
   GAME 6 & 11 — match (pins 'm' / sensors 's')
============================================================ */
function matchPick(btn,mode){
  if(btn.classList.contains('done'))return;
  const stateSel=mode==='m'?'matchSel':'senSel';
  const stateDone=mode==='m'?'matchDone':'senDone';
  const total=mode==='m'?4:3,per=mode==='m'?25:30;
  const hint=document.getElementById(mode==='m'?'mHint':'sHint');
  const scope=btn.closest('.match-wrap');
  if(!g[stateSel]){g[stateSel]=btn;btn.classList.add('sel');return;}
  if(g[stateSel]===btn){btn.classList.remove('sel');g[stateSel]=null;return;}
  if(g[stateSel].dataset.side===btn.dataset.side){g[stateSel].classList.remove('sel');g[stateSel]=btn;btn.classList.add('sel');return;}
  const a=g[stateSel],b=btn;a.classList.remove('sel');
  if(a.dataset.i===b.dataset.i){
    a.classList.add('done');b.classList.add('done');
    g[stateDone]++;
    let pts=per;
    if(g[stateDone]===total&&mode==='s')pts+=10; /* finish bonus */
    addPoints(pts,false);
    hint.textContent=g[stateDone]+' / '+total+' matched · tercocokkan';
    if(g[stateDone]===total)hint.textContent='All matched! · Semua cocok!';
  }else{
    a.classList.add('err');b.classList.add('err');
    setTimeout(()=>{a.classList.remove('err');b.classList.remove('err');},450);
    addPoints(5,true);
  }
  g[stateSel]=null;
}

/* ============================================================
   GAME 7 — binary
============================================================ */
function bitFlip(i){
  if(g.binDone)return;
  g.bits[i]=1-g.bits[i];
  const b=document.getElementById('bit'+i);
  b.classList.toggle('on',!!g.bits[i]);
  b.querySelector('.bd').textContent=g.bits[i];
  const sum=g.bits[0]*8+g.bits[1]*4+g.bits[2]*2+g.bits[3];
  document.getElementById('binSum').textContent=sum;
}
function binCheck(){
  if(g.binDone)return;
  g.binTries++;
  const sum=g.bits[0]*8+g.bits[1]*4+g.bits[2]*2+g.bits[3];
  const fb=document.getElementById('binFb');
  if(sum===g.binTarget){
    g.binDone=true;
    const pts=tieredPts(g.binTries);if(g.binTries===1)firstTry++;
    addPoints(pts,false);
    const bin=g.bits.join('');
    okFb(fb,'+'+pts+' — '+g.binTarget+' in binary is '+bin+'. You speak computer now.','+'+pts+' — '+g.binTarget+' dalam biner adalah '+bin+'. Kamu bisa bahasa komputer sekarang.');
  }else{
    addPoints(10,true);
    noFb(fb,'+10 — you have '+sum+', target is '+g.binTarget+'. '+(sum<g.binTarget?'Add a bigger bit.':'Turn one off.'),(sum<g.binTarget?'Nyalakan bit yang lebih besar.':'Matikan satu bit.'));
  }
}

/* ============================================================
   GAME 8 — blink sim
============================================================ */
function setDelay(v){
  g.blinkDelay=+v;
  document.getElementById('delayVal').textContent=v+' ms';
  document.getElementById('cD1').textContent=v;
  document.getElementById('cD2').textContent=v;
}
function blinkStep(){
  const led=document.getElementById('simLed');
  if(!led){stopBlink();return;}
  g.blinkOn=!g.blinkOn;
  led.classList.toggle('on',g.blinkOn);
  g.blinkTimer=setTimeout(blinkStep,g.blinkDelay);
}
function uploadBlink(){
  stopBlink();
  if(!g.blinkBonus){g.blinkBonus=true;addPoints(50,false);}
  const b=document.getElementById('uplBtn');
  b.innerHTML=I.refresh+'<span>Running · Berjalan</span>';
  g.blinkOn=false;blinkStep();
}
function stopBlink(){if(g.blinkTimer){clearTimeout(g.blinkTimer);g.blinkTimer=null;}}

/* ============================================================
   GAME 9 — bug hunt
============================================================ */
function bugPick(i){
  if(g.bugDone)return;
  g.bugTries++;
  const line=document.getElementById('bug'+i),fb=document.getElementById('bugFb');
  if(g.bugLines[i].ok){
    g.bugDone=true;
    line.classList.add('correct','locked');
    document.querySelectorAll('.bugline').forEach(l=>l.classList.add('locked'));
    const pts=tieredPts(g.bugTries);if(g.bugTries===1)firstTry++;
    addPoints(pts,false);
    okFb(fb,'+'+pts+' — HGIH should be HIGH. Compilers forgive nothing.','HGIH seharusnya HIGH. Komputer tidak memaafkan salah ketik.');
  }else{
    line.classList.add('wrong');setTimeout(()=>line.classList.remove('wrong'),450);
    addPoints(10,true);
    noFb(fb,'+10 — that line is fine. Read each word slowly.','Baris itu benar. Baca tiap kata pelan-pelan.');
  }
}

/* ============================================================
   GAME 10 — wiring order
============================================================ */
function orderPick(btn){
  const i=+btn.dataset.i,fb=document.getElementById('orderFb');
  if(i===g.orderPos){
    btn.classList.add('used');
    const seq=document.getElementById('orderSeq');
    if(g.orderPos===0)seq.innerHTML='';
    if(g.orderPos>0)seq.insertAdjacentHTML('beforeend',`<span class="arrowsep">${I.arrow}</span>`);
    seq.insertAdjacentHTML('beforeend',`<span class="slot">${g.orderSteps[i]}</span>`);
    g.orderPos++;
    if(g.orderPos===g.orderSteps.length){
      const pts=Math.max(40,100-15*g.orderMistakes);
      if(g.orderMistakes===0)firstTry++;
      addPoints(pts,false);
      okFb(fb,'+'+pts+' — perfect loop! Upload the code and it blinks.','Lingkaran sempurna! Unggah kodenya dan LED berkedip.');
    }
  }else{
    g.orderMistakes++;
    btn.classList.add('err');setTimeout(()=>btn.classList.remove('err'),450);
    addPoints(5,true);
    noFb(fb,'+5 — not yet! Current leaves the pin first.','Belum tepat! Arus keluar dari pin dulu, lalu resistor.');
  }
}

/* ============================================================
   RESULTS
============================================================ */
function fillResults(){
  const pct=Math.min(100,Math.round(score/MAX*100));
  const sEl=document.getElementById('resScore');
  clearInterval(window._cnt);
  let shown=0;
  window._cnt=setInterval(()=>{
    shown+=Math.max(1,Math.ceil(score/45));
    if(shown>=score){shown=score;clearInterval(window._cnt);}
    sEl.textContent=shown;
  },22);
  setTimeout(()=>{document.getElementById('ringArc').style.strokeDashoffset=515-(515*pct/100);},150);
  document.getElementById('resPct').textContent='of '+MAX+' · '+pct+'%';
  let lvl,msgEn,msgId,bg;
  if(pct>=85){lvl='Circuit Master';bg='#e3a23b';msgEn='Outstanding! Circuits, binary, PWM, code — you understand it all.';msgId='Luar biasa! Rangkaian, biner, PWM, kode — kamu paham semuanya.';}
  else if(pct>=65){lvl='Junior Engineer';bg='#e3a23b';msgEn='Excellent! You are ready to build real Arduino projects.';msgId='Hebat! Kamu siap membangun proyek Arduino sungguhan.';}
  else if(pct>=45){lvl='Rising Maker';bg='#5fd3c7';msgEn='Nice work! One more run and you will master it — the questions will be new.';msgId='Bagus! Sekali lagi dan kamu akan mahir — soalnya akan baru.';}
  else{lvl='Brave Explorer';bg='#5fd3c7';msgEn='Good start! Replay the lesson — every run gives new questions.';msgId='Awal yang bagus! Ulangi pelajarannya — tiap sesi soalnya baru.';}
  document.getElementById('resLevelTxt').textContent=lvl;
  document.getElementById('resLevel').style.background=bg;
  document.getElementById('resMsg').innerHTML=msgEn+'<br><span class="id">'+msgId+'</span>';
  document.getElementById('stQuiz').textContent=g.quizPts;
  document.getElementById('stFirst').textContent=firstTry;
}

/* ============================================================
   RESTART — full reshuffle, fresh state (nothing stored)
============================================================ */
function restart(){
  stopBlink();
  score=0;document.getElementById('scoreVal').textContent='0';
  mount();
}

mount();
</script>
